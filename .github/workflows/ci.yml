name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Авто-отмена старых раннов для той же ветки/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci || npm install

      # Выполнится только если есть скрипт "lint" в package.json
      - name: Lint (if present)
        run: |
          npm run -s | grep -q "^  lint" && npm run lint || echo "No lint script"

      # Выполнится только если есть скрипт "test" в package.json
      - name: Test (if present)
        run: |
          npm run -s | grep -q "^  test" && npm run test || echo "No test script"

      - name: Build
        run: npm run build

      - name: Upload production artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist
          if-no-files-found: warn
